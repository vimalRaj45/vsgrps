<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | VSGRPS Technologies</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to VSGRPS Technologies homepage or explore our services." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #000;
      --surface: #0a0a0a;
      --border: #1a1a1a;
      --text: #ffffff;
      --text-secondary: #888;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
    }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 640px;
      text-align: center;
    }
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 40px var(--accent-glow));
    }
    .title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
      color: var(--text);
    }
    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .search-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
    }
    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .search-input::placeholder { color: var(--text-secondary); }
    .search-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .search-btn:hover { opacity: 0.85; }
    .links {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .link-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1.25rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      transition: border-color 0.2s, transform 0.2s;
    }
    .link-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .link-card .icon { font-size: 1.5rem; }
    .support-note {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    .support-note a {
      color: var(--accent);
      text-decoration: none;
    }
    .support-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="title">Page Not Found</h1>
    <p class="subtitle">
      Oops! The page you're looking for doesn't exist or has been moved.<br>
      Let's get you back on track.
    </p>

    <form class="search-form" action="https://vsgrps.com/" method="get">
      <input class="search-input" type="search" name="q" placeholder="Search VSGRPS..." aria-label="Search" />
      <button class="search-btn" type="submit">Search</button>
    </form>

    <nav class="links" aria-label="Main navigation links">
      <a href="/" class="link-card">
        <span class="icon">🏠</span>
        <span>Home</span>
      </a>
      <a href="/services" class="link-card">
        <span class="icon">⚙️</span>
        <span>Services</span>
      </a>
      <a href="/projects" class="link-card">
        <span class="icon">💼</span>
        <span>Portfolio</span>
      </a>
      <a href="/contact" class="link-card">
        <span class="icon">✉️</span>
        <span>Contact</span>
      </a>
      <a href="/blog" class="link-card">
        <span class="icon">📝</span>
        <span>Blog</span>
      </a>
      <a href="https://certifypro.vsgrps.com" class="link-card" target="_blank" rel="noopener noreferrer">
        <span class="icon">🏆</span>
        <span>CertifyPro</span>
      </a>
    </nav>

    <p class="support-note">
      Need help? <a href="mailto:vimalraj5207@gmail.com">Contact our support team</a>
    </p>
  </div>
</body>
</html>
