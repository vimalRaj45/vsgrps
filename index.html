    <!-- FIX 3: Removed maximum-scale=1, user-scalable=0 → Accessibility ↑ -->

    <!-- Updated SEO tags for VSGRPS / Vision Solutions Groups / VSGRPS Technologies -->

    <meta name="description" content="VSGRPS (Vision Solutions Groups) is a leading software development company in India. VSGRPS Technologies provides high-end web apps, automation systems, and digital solutions to scale your business." />
    <meta name="keywords" content="VSGRPS, Vision Solutions Groups, VSGRPS Technologies, software development India, web development, automation systems, digital solutions India" />
    <meta name="author" content="VSGRPS Technologies" />
    <link rel="canonical" href="https://vsgrps.com" />
    <meta name="google-site-verification" content="gqqLAlnUqc6eBcVbBjlEkRH3F6Xhy6NhBpjzFqsMlis" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://vsgrps.com/" />
    <meta property="og:title" content="VSGRPS | Vision Solutions Groups | VSGRPS Technologies" />
    <meta property="og:description" content="Leading software development company in India specializing in web apps and automation." />
    <meta property="og:image" content="https://vsgrps.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://vsgrps.com/" />
    <meta property="twitter:title" content="VSGRPS Technologies — Vision Solutions Groups" />
    <meta property="twitter:description" content="Building Digital Excellence with VSGRPS Technologies." />
    <meta property="twitter:image" content="https://vsgrps.com/og-image.jpg" />

    <!-- Schema: Organization + LocalBusiness + WebSite + Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "VSGRPS",
      "alternateName": ["Vision Solutions Groups", "VSGRPS Technologies","VSGRPS Namakkal","VSGRPS","vsgrps"],
      "url": "https://vsgrps.com",
      "logo": "https://vsgrps.com/logo.png",
      "description": "VSGRPS (Vision Solutions Groups) is a leading software development company in India specializing in web apps and automation via VSGRPS Technologies.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://www.linkedin.com/company/vsgrps",
        "https://www.instagram.com/vsgrps",
        "https://twitter.com/vsgrps"
      ]
    }
    </script>

    <!-- FIX 4: Trimmed to exactly 2 preconnects (removed unpkg, lottie.host, lottiefiles) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- FIX 7: Google Fonts with display=swap for FCP improvement -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- Inline theme init — prevents flash of wrong theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('vsgrps_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') document.documentElement.style.backgroundColor = '#000000';
        } catch (e) {}
      })();
    </script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('Service Worker Registered'); })
            .catch(function(err) { console.log('Service Worker Registration Failed', err); });
        });
      }
    </script>

    <!-- FIX 17: Google Analytics 4 — replace G-XXXXXXXXXX with your actual Measurement ID -->
    <!-- <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <noscript>Please enable JavaScript to view this website.</noscript>

    <!-- FIX 5: Lazy-load Lottie scripts after page load → LCP ↓, TBT ↓ -->
    <script>
      window.addEventListener('load', function () {
        var s1 = document.createElement('script');
        s1.type = 'module';
        s1.src = 'https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js';
        document.body.appendChild(s1);

        var s2 = document.createElement('script');
        s2.defer = true;
        s2.src = 'https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js';
        document.body.appendChild(s2);
      });
    </script>
  </body>
</html>
