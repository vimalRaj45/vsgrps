    <!-- FIX 11: Enhanced @graph Schema with Organization + WebSite + Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "VSGRPS Technologies",
          "url": "https://vsgrps.com",
          "logo": "https://vsgrps.com/logo.png",
          "description": "VSGRPS Technologies is a software development company in Namakkal, Tamil Nadu, India helping startups and businesses worldwide with web development, app development, digital marketing and SaaS products.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Namakkal",
            "addressRegion": "Tamil Nadu",
            "addressCountry": "IN"
          },
          "contactPoint": {
            "@type": "ContactPoint",
            "telephone": "+91-8807099288",
            "contactType": "customer service",
            "availableLanguage": ["English", "Tamil"]
          },
          "sameAs": [
            "https://github.com/vimalRaj45",
            "https://www.linkedin.com/in/vimal-raj-s-b83b42324"
          ],
          "foundingLocation": "Namakkal, Tamil Nadu, India",
          "areaServed": "Worldwide"
        },
        {
          "@type": "WebSite",
          "url": "https://vsgrps.com",
          "name": "VSGRPS Technologies",
          "description": "Building Digital Excellence",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://vsgrps.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Service",
          "serviceType": "Software Development",
          "provider": {
            "@type": "Organization",
            "name": "VSGRPS Technologies"
          },
          "areaServed": "Worldwide",
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Digital Services",
            "itemListElement": [
              {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Web Development"}},
              {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "App Development"}},
              {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "Digital Marketing"}},
              {"@type": "Offer", "itemOffered": {"@type": "Service", "name": "SaaS Development"}}
            ]
          }
        }
      ]
    }
    </script>

    <!-- FIX 4: Trimmed to exactly 2 preconnects (removed unpkg, lottie.host, lottiefiles) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- FIX 7: Google Fonts with display=swap for FCP improvement -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />

    <!-- Inline theme init — prevents flash of wrong theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('vsgrps_theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          if (theme === 'dark') document.documentElement.style.backgroundColor = '#000000';
        } catch (e) {}
      })();
    </script>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) { console.log('Service Worker Registered'); })
            .catch(function(err) { console.log('Service Worker Registration Failed', err); });
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <noscript>Please enable JavaScript to view this website.</noscript>

    <!-- FIX 5: Lazy-load Lottie scripts after page load → LCP ↓, TBT ↓ -->
    <script>
      window.addEventListener('load', function () {
        var s1 = document.createElement('script');
        s1.type = 'module';
        s1.src = 'https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js';
        document.body.appendChild(s1);

        var s2 = document.createElement('script');
        s2.defer = true;
        s2.src = 'https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js';
        document.body.appendChild(s2);
      });
    </script>
  </body>
</html>
